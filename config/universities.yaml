# To add a 4th university: just add a new block here — zero code changes needed

universities:
  - id: mit
    name: Massachusetts Institute of Technology
    country: USA
    currency: USD
    pages:
      about: https://web.mit.edu/aboutmit/
      tuition: https://sfs.mit.edu/graduate-students/the-cost-of-attendance/annual-student-budget/
      scholarships: https://mitsloan.mit.edu/mba/admissions/financial-aid-fellowships
      courses: https://student.mit.edu/catalog/index.cgi
      deadlines: https://mitadmissions.org/apply/firstyear/dates-deadlines/
      visa: https://iso.mit.edu/immigration-topics/students/
      # Career outcomes page: aggregates employment rate + salary data by major/field
      employment: https://capd.mit.edu/explore-careers/career-outcomes/
      # Living costs are embedded in the cost-of-attendance budget — same page as tuition
      living: https://sfs.mit.edu/graduate-students/the-cost-of-attendance/annual-student-budget/

  - id: unimelb
    name: University of Melbourne
    country: Australia
    currency: AUD
    pages:
      about: https://about.unimelb.edu.au/
      tuition: https://students.unimelb.edu.au/admin/fees
      scholarships: https://scholarships.unimelb.edu.au/
      courses: https://handbook.unimelb.edu.au/
      deadlines: https://study.unimelb.edu.au/how-to-apply/key-dates
      visa: https://students.unimelb.edu.au/student-support/international-student-support/visas
      # Graduate outcomes page: employment rates, salaries, destinations by faculty
      employment: https://about.unimelb.edu.au/strategy/melbourne-2030/graduate-outcomes
      # Student fees page covers living cost estimates for international students
      living: https://students.unimelb.edu.au/admin/fees

  - id: utoronto
    name: University of Toronto
    country: Canada
    currency: CAD
    pages:
      about: https://www.utoronto.ca/about-u-of-t
      tuition: https://fees.utoronto.ca/
      scholarships: https://www.sgs.utoronto.ca/awards/
      courses: https://artsci.calendar.utoronto.ca/
      deadlines: https://future.utoronto.ca/apply/deadlines/
      visa: https://internationalstudents.utoronto.ca/immigration/
      # Graduate outcomes page: employment stats, salary ranges, alumni destinations
      employment: https://future.utoronto.ca/why-u-of-t/graduate-outcomes/
      # Cost of living breakdown for prospective students
      living: https://future.utoronto.ca/finances/cost-of-living/
